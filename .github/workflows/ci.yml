name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Start Environment with Docker Compose
        run: |
          docker compose up --build -d
          echo "Väntar på att tjänsterna ska initieras..."
          sleep 15

      - name: Cypress run
        uses: cypress-io/github-action@v6